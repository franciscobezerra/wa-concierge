<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp MCP - Login</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --border: #2a2a3a;
      --text: #e4e4e8;
      --text-muted: #8888a0;
      --accent: #25d366;
      --accent-dim: #1da851;
      --danger: #e74c5e;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 360px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 20px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-card .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); display: inline-block;
    }
    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: #1e1e2a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      margin-bottom: 16px;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-card button:hover { background: var(--accent-dim); }
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1><span class="dot"></span> WhatsApp MCP</h1>
    <p>Digite a senha para acessar o painel</p>
    <form onsubmit="doLogin(event)">
      <input type="password" id="password" placeholder="Senha" autofocus>
      <button type="submit">Entrar</button>
    </form>
    <div class="error" id="error">Senha incorreta</div>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>
